[build]
  base    = "codelearnhub/frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION       = "20"
  NPM_FLAGS          = "--legacy-peer-deps --no-audit --no-fund"
  GENERATE_SOURCEMAP = "false"
  CI                 = "false"
  NODE_MODULES_CACHE = "false"
  REACT_APP_BACKEND_URL = "https://codelearn-hub-backend.onrender.com"

[[scheduled.functions]]
  name = "keep-render-awake"
  cron = "*/10 * * * *"

# SPA fallback — every route serves index.html (React Router handles client-side routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
